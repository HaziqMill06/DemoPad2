<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paddy Cafe & Restaurant | Ultra-Premium Dining</title>
    <meta name="description" content="Experience great food surrounded by nature at Paddy Cafe & Restaurant, Penaga, Pulau Pinang. Premium local and western cuisine.">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.29/bundled/lenis.min.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        forest: '#0a1f14',
                        'forest-light': '#143323',
                        gold: '#d4af37',
                        'gold-light': '#f3d573',
                        light: '#f8f9fa',
                        wood: '#3d2817'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif']
                    },
                    animation: {
                        'spin-slow': 'spin 8s linear infinite',
                    }
                }
            }
        }
    </script>
    <style>
        /* Base Styles & Smooth Scroll hiding native scrollbar */
        body {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            background-color: #0a1f14;
            color: #f8f9fa;
            cursor: none; /* Custom cursor */
        }
        
        .light body {
            background-color: #f8f9fa;
            color: #0a1f14;
        }

        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }

        /* Lenis Recommended Styles */
        html.lenis { height: auto; }
        .lenis.lenis-smooth { scroll-behavior: auto; }
        .lenis.lenis-smooth [data-lenis-prevent] { overscroll-behavior: contain; }
        .lenis.lenis-stopped { overflow: hidden; }
        .lenis.lenis-scrolling iframe { pointer-events: none; }

        /* Glassmorphism */
        .glass {
            background: rgba(10, 31, 20, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(212, 175, 55, 0.1);
        }
        
        .light .glass {
            background: rgba(248, 249, 250, 0.6);
            border: 1px solid rgba(10, 31, 20, 0.1);
        }

        /* Image Hover Zoom */
        .img-zoom-container { overflow: hidden; }
        .img-zoom-container img {
            transition: transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .img-zoom-container:hover img {
            transform: scale(1.08);
        }

        /* Custom Cursor */
        #custom-cursor {
            position: fixed;
            top: 0;
            left: 0;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background-color: #d4af37;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s, background-color 0.3s;
            mix-blend-mode: difference;
        }
        #custom-cursor.hover {
            width: 60px;
            height: 60px;
            background-color: rgba(212, 175, 55, 0.5);
            backdrop-filter: blur(2px);
        }
        
        /* Masonry */
        .masonry {
            column-count: 1;
            column-gap: 1.5rem;
        }
        @media (min-width: 640px) { .masonry { column-count: 2; } }
        @media (min-width: 1024px) { .masonry { column-count: 3; } }
        .masonry-item { break-inside: avoid; margin-bottom: 1.5rem; }

        /* Split Text Hide */
        .split-line { overflow: hidden; }
        .split-word { display: inline-block; transform: translateY(100%); opacity: 0; }

        /* Logo image styling */
        .logo-img {
            height: 40px;
            width: auto;
            filter: drop-shadow(0 0 8px rgba(212, 175, 55, 0.3));
        }
        .dark .logo-img {
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.4));
        }
        /* For light mode logo invert or adjust if needed */
        .light .logo-img {
            filter: brightness(0.9) drop-shadow(0 0 6px rgba(212, 175, 55, 0.2));
        }
    </style>
</head>
<body>
    <div id="custom-cursor"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useLayoutEffect, createContext, useContext } = React;
        gsap.registerPlugin(ScrollTrigger);

        // Icons (Inline SVGs for reliability & zero dependencies)
        const Icons = {
            Menu: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>,
            X: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>,
            MapPin: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>,
            Clock: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
            Phone: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>,
            Sun: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>,
            Moon: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>,
            ChevronDown: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m6 9 6 6 6-6"/></svg>,
            Instagram: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg>,
            Facebook: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>,
            WhatsApp: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>,
            ArrowUpRight: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M7 7h10v10"/><path d="M7 17 17 7"/></svg>
        };

        const ThemeContext = createContext();

        // Split text utility for GSAP animation
        const AnimatedText = ({ text, className = "" }) => {
            const words = text.split(" ");
            return (
                <div className={`flex flex-wrap ${className} split-text-container`}>
                    {words.map((word, i) => (
                        <div key={i} className="split-line mr-[0.2em] mb-[0.1em]">
                            <span className="split-word">{word}</span>
                        </div>
                    ))}
                </div>
            );
        };

        const Loader = ({ setLoading }) => {
            const loaderRef = useRef(null);
            
            useEffect(() => {
                const tl = gsap.timeline({
                    onComplete: () => setLoading(false)
                });
                
                tl.to(".loader-logo", { opacity: 1, duration: 1, ease: "power2.inOut" })
                  .to(".loader-logo", { scale: 1.1, duration: 1, ease: "power2.inOut" })
                  .to(loaderRef.current, { yPercent: -100, duration: 1, ease: "expo.inOut", delay: 0.5 });
            }, []);

            return (
                <div ref={loaderRef} className="fixed inset-0 z-[100] bg-forest flex items-center justify-center">
                    {/* Loader with logo image */}
                    <img 
                        src="images/logo.jpg" 
                        alt="Paddy Cafe Logo" 
                        className="loader-logo opacity-0 h-24 w-auto md:h-32 object-contain"
                        onError={(e) => { e.target.style.display = 'none'; }} // fallback if image fails
                    />
                    <h1 className="loader-logo opacity-0 text-gold font-serif text-4xl md:text-6xl tracking-widest absolute">
                        
                    </h1>
                </div>
            );
        };

        const Navbar = () => {
            const [isScrolled, setIsScrolled] = useState(false);
            const [menuOpen, setMenuOpen] = useState(false);
            const { isDark, toggleTheme } = useContext(ThemeContext);

            useEffect(() => {
                const handleScroll = () => {
                    setIsScrolled(window.scrollY > 50);
                };
                window.addEventListener("scroll", handleScroll);
                return () => window.removeEventListener("scroll", handleScroll);
            }, []);

            const handleInteractiveHover = (e) => {
                const cursor = document.getElementById('custom-cursor');
                if(e.type === 'mouseenter') cursor.classList.add('hover');
                else cursor.classList.remove('hover');
            };

            return (
                <>
                    <nav className={`fixed w-full z-50 transition-all duration-500 ${isScrolled ? 'py-4 glass' : 'py-6 bg-transparent'}`}>
                        <div className="container mx-auto px-6 lg:px-12 flex justify-between items-center">
                            {/* Logo with image */}
                            <a href="#" className="flex items-center gap-2 z-50" 
                               onMouseEnter={handleInteractiveHover} onMouseLeave={handleInteractiveHover}>
                                <img 
                                    src="images/logo.jpg" 
                                    alt="Paddy Cafe Logo" 
                                    className="logo-img h-10 w-auto"
                                    onError={(e) => { e.target.style.display = 'none'; }} // fallback if image fails
                                />
                                <span className="font-serif text-2xl tracking-widest text-gold font-bold hidden sm:inline">
                                    PADDY CAFE
                                </span>
                            </a>
                            
                            <div className="hidden md:flex items-center space-x-8 text-sm font-medium tracking-wide">
                                {['About', 'Menu', 'Gallery', 'Events'].map((item) => (
                                    <a key={item} href={`#${item.toLowerCase()}`} 
                                       className="hover:text-gold transition-colors duration-300"
                                       onMouseEnter={handleInteractiveHover} onMouseLeave={handleInteractiveHover}>
                                        {item}
                                    </a>
                                ))}
                                <button onClick={toggleTheme} className="hover:text-gold transition-colors"
                                        onMouseEnter={handleInteractiveHover} onMouseLeave={handleInteractiveHover}>
                                    {isDark ? <Icons.Sun /> : <Icons.Moon />}
                                </button>
                                <a href="#book" className="px-6 py-2 border border-gold text-gold hover:bg-gold hover:text-forest transition-colors rounded-full"
                                   onMouseEnter={handleInteractiveHover} onMouseLeave={handleInteractiveHover}>
                                    Book Table
                                </a>
                            </div>

                            <button className="md:hidden z-50 text-gold" onClick={() => setMenuOpen(!menuOpen)}>
                                {menuOpen ? <Icons.X /> : <Icons.Menu />}
                            </button>
                        </div>
                    </nav>

                    {/* Mobile Menu */}
                    <div className={`fixed inset-0 bg-forest z-40 flex flex-col items-center justify-center transition-transform duration-700 ease-in-out ${menuOpen ? 'translate-y-0' : '-translate-y-full'}`}>
                        <div className="flex flex-col space-y-8 text-center text-2xl font-serif text-light">
                            {['About', 'Menu', 'Gallery', 'Events', 'Book'].map((item) => (
                                <a key={item} href={`#${item.toLowerCase()}`} onClick={() => setMenuOpen(false)} className="hover:text-gold transition-colors">
                                    {item}
                                </a>
                            ))}
                            <button onClick={toggleTheme} className="flex items-center justify-center space-x-2 text-gold">
                                {isDark ? <><Icons.Sun /> <span>Light Mode</span></> : <><Icons.Moon /> <span>Dark Mode</span></>}
                            </button>
                        </div>
                    </div>
                </>
            );
        };

        const Hero = () => {
            const heroRef = useRef(null);
            
            useEffect(() => {
                const ctx = gsap.context(() => {
                    gsap.to(".hero-content", {
                        y: 150,
                        opacity: 0,
                        ease: "none",
                        scrollTrigger: {
                            trigger: heroRef.current,
                            start: "top top",
                            end: "bottom top",
                            scrub: true
                        }
                    });

                    // Initial text animation
                    gsap.to(".split-word", {
                        y: 0,
                        opacity: 1,
                        duration: 1,
                        stagger: 0.1,
                        ease: "power4.out",
                        delay: 1.2
                    });
                    
                    gsap.fromTo(".hero-fade", 
                        { opacity: 0, y: 20 },
                        { opacity: 1, y: 0, duration: 1, stagger: 0.2, delay: 2, ease: "power2.out" }
                    );
                }, heroRef);
                return () => ctx.revert();
            }, []);

            return (
                <section ref={heroRef} className="relative h-screen w-full flex items-center justify-center overflow-hidden">
                    {/* Cinematic Video Background */}
                    <div className="absolute inset-0 w-full h-full">
                        <div className="absolute inset-0 bg-black/50 z-10"></div>
                        <video 
                            autoPlay 
                            loop 
                            muted 
                            playsInline
                            className="w-full h-full object-cover scale-105"
                            style={{ filter: 'contrast(1.1) saturate(1.2)' }}
                        >
                            <source src="Videos/CinematikPaddy.mp4" type="video/mp4" />
                        </video>
                    </div>

                    {/* Content */}
                    <div className="relative z-20 text-center flex flex-col items-center px-4 hero-content mt-20">
                        <div className="glass p-8 md:p-16 rounded-3xl max-w-4xl mx-auto shadow-2xl">
                            <h2 className="text-gold text-sm md:text-base tracking-[0.3em] uppercase mb-4 hero-fade font-semibold">
                                Est. 2023 • Penaga, Pulau Pinang
                            </h2>
                            <AnimatedText 
                                text="Experience Great Food Surrounded by Nature" 
                                className="justify-center text-4xl md:text-6xl lg:text-7xl font-serif text-white font-bold leading-tight mb-6 drop-shadow-lg"
                            />
                            <p className="text-gray-200 md:text-lg max-w-xl mx-auto mb-10 hero-fade font-light leading-relaxed">
                                Indulge in premium local and western cuisine with a breathtaking view of serene paddy fields. A perfect blend of luxury and nature.
                            </p>
                            <div className="flex flex-col sm:flex-row items-center justify-center space-y-4 sm:space-y-0 sm:space-x-6 hero-fade">
                                <a href="#book" className="w-full sm:w-auto px-8 py-4 bg-gold text-forest font-medium rounded-full hover:bg-white hover:scale-105 transition-all duration-300">
                                    Reserve a Table
                                </a>
                                <a href="#menu" className="w-full sm:w-auto px-8 py-4 border border-white text-white font-medium rounded-full hover:bg-white hover:text-forest transition-all duration-300">
                                    View Menu
                                </a>
                            </div>
                        </div>
                    </div>

                    {/* Scroll Indicator */}
                    <div className="absolute bottom-10 left-1/2 transform -translate-x-1/2 z-20 flex flex-col items-center hero-fade">
                        <span className="text-white text-xs tracking-widest uppercase mb-2">Scroll</span>
                        <div className="w-[1px] h-12 bg-white/30 overflow-hidden">
                            <div className="w-full h-full bg-gold animate-bounce"></div>
                        </div>
                    </div>
                </section>
            );
        };

        const Section3D = () => {
            const mountRef = useRef(null);
            const containerRef = useRef(null);

            useEffect(() => {
                if (!mountRef.current) return;

                // Scene setup
                const scene = new THREE.Scene();
                // Add soft environment lighting
                const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
                scene.add(ambientLight);
                const dirLight = new THREE.DirectionalLight(0xd4af37, 1);
                dirLight.position.set(5, 5, 5);
                scene.add(dirLight);
                const fillLight = new THREE.DirectionalLight(0x444455, 0.8);
                fillLight.position.set(-5, 0, -5);
                scene.add(fillLight);

                const camera = new THREE.PerspectiveCamera(45, mountRef.current.clientWidth / mountRef.current.clientHeight, 0.1, 100);
                camera.position.z = 6;
                camera.position.y = 1.5;
                camera.lookAt(0, 0, 0);

                const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
                renderer.setSize(mountRef.current.clientWidth, mountRef.current.clientHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                mountRef.current.appendChild(renderer.domElement);

                // Create Coffee Cup Group
                const cupGroup = new THREE.Group();

                // Cup Body (Dark Green Ceramic)
                const cupGeo = new THREE.CylinderGeometry(1.2, 0.8, 1.8, 64);
                const cupMat = new THREE.MeshPhysicalMaterial({ 
                    color: 0x0a1f14, 
                    roughness: 0.1, 
                    metalness: 0.1,
                    clearcoat: 1.0,
                    clearcoatRoughness: 0.1
                });
                const cup = new THREE.Mesh(cupGeo, cupMat);
                cupGroup.add(cup);

                // Cup Interior (White)
                const insideGeo = new THREE.CylinderGeometry(1.15, 0.75, 1.81, 64);
                const insideMat = new THREE.MeshPhysicalMaterial({ color: 0xffffff, roughness: 0.5 });
                const inside = new THREE.Mesh(insideGeo, insideMat);
                cupGroup.add(inside);

                // Coffee Liquid
                const liquidGeo = new THREE.CylinderGeometry(1.1, 0.7, 1.6, 64);
                const liquidMat = new THREE.MeshStandardMaterial({ color: 0x2b1408, roughness: 0.2 });
                const liquid = new THREE.Mesh(liquidGeo, liquidMat);
                liquid.position.y = 0.05;
                cupGroup.add(liquid);

                // Cup Handle (Gold)
                const handleGeo = new THREE.TorusGeometry(0.6, 0.15, 16, 64);
                const handleMat = new THREE.MeshStandardMaterial({ color: 0xd4af37, metalness: 0.8, roughness: 0.2 });
                const handle = new THREE.Mesh(handleGeo, handleMat);
                handle.position.set(1.1, 0, 0);
                handle.rotation.z = -Math.PI / 16;
                cupGroup.add(handle);

                // Saucer
                const saucerGeo = new THREE.CylinderGeometry(1.8, 1.5, 0.1, 64);
                const saucerMat = new THREE.MeshPhysicalMaterial({ color: 0x0a1f14, roughness: 0.1, clearcoat: 1.0 });
                const saucer = new THREE.Mesh(saucerGeo, saucerMat);
                saucer.position.y = -0.95;
                cupGroup.add(saucer);

                scene.add(cupGroup);
                cupGroup.position.y = -0.5;

                // Steam Particles
                const particleCount = 100;
                const particles = new THREE.BufferGeometry();
                const positions = new Float32Array(particleCount * 3);
                for(let i=0; i<particleCount*3; i++) {
                    positions[i] = (Math.random() - 0.5) * 1.5; // Spread
                }
                particles.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                const particleMat = new THREE.PointsMaterial({
                    color: 0xffffff,
                    size: 0.05,
                    transparent: true,
                    opacity: 0.4,
                    blending: THREE.AdditiveBlending
                });
                const particleSystem = new THREE.Points(particles, particleMat);
                particleSystem.position.y = 1;
                scene.add(particleSystem);

                // Animation Loop
                let reqId;
                const clock = new THREE.Clock();
                
                const animate = () => {
                    const elapsedTime = clock.getElapsedTime();
                    
                    // Gentle floating animation
                    cupGroup.position.y = -0.5 + Math.sin(elapsedTime * 1.5) * 0.05;
                    
                    // Animate steam
                    const positions = particleSystem.geometry.attributes.position.array;
                    for(let i=1; i<particleCount*3; i+=3) {
                        positions[i] += 0.01; // move up
                        positions[i-1] += Math.sin(elapsedTime + i) * 0.005; // sway x
                        if (positions[i] > 2) {
                            positions[i] = 0; // reset height
                        }
                    }
                    particleSystem.geometry.attributes.position.needsUpdate = true;

                    renderer.render(scene, camera);
                    reqId = requestAnimationFrame(animate);
                };
                animate();

                // GSAP ScrollTrigger for 3D rotation
                const ctx = gsap.context(() => {
                    gsap.to(cupGroup.rotation, {
                        y: Math.PI * 2,
                        ease: "none",
                        scrollTrigger: {
                            trigger: containerRef.current,
                            start: "top bottom",
                            end: "bottom top",
                            scrub: 1
                        }
                    });
                }, containerRef);

                // Resize handler
                const handleResize = () => {
                    if(!mountRef.current) return;
                    camera.aspect = mountRef.current.clientWidth / mountRef.current.clientHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(mountRef.current.clientWidth, mountRef.current.clientHeight);
                };
                window.addEventListener('resize', handleResize);

                return () => {
                    window.removeEventListener('resize', handleResize);
                    cancelAnimationFrame(reqId);
                    ctx.revert();
                    if(mountRef.current) mountRef.current.removeChild(renderer.domElement);
                };
            }, []);

            return (
                <section id="3d-showcase" ref={containerRef} className="py-24 relative overflow-hidden bg-forest dark:bg-forest text-light">
                    <div className="container mx-auto px-6 lg:px-12 flex flex-col lg:flex-row items-center">
                        <div className="w-full lg:w-1/2 z-10 mb-12 lg:mb-0">
                            <h3 className="text-gold font-serif text-4xl md:text-6xl mb-6 leading-tight">
                                Crafted to <br/><span className="italic">Perfection</span>
                            </h3>

        const App = () => {
            const [loading, setLoading] = useState(true);
            const [isDark, setIsDark] = useState(true);

            // Initialize Lenis Smooth Scroll
            useEffect(() => {
                const lenis = new Lenis({
                    duration: 1.2,
                    easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)), 
                    direction: 'vertical',
                    gestureDirection: 'vertical',
                    smooth: true,
                    mouseMultiplier: 1,
                    smoothTouch: false,
                    touchMultiplier: 2,
                });

                function raf(time) {
                    lenis.raf(time);
                    ScrollTrigger.update();
                    requestAnimationFrame(raf);
                }
                requestAnimationFrame(raf);

                return () => lenis.destroy();
            }, []);

            // Handle Custom Cursor Movement
            useEffect(() => {
                const cursor = document.getElementById('custom-cursor');
                const moveCursor = (e) => {
                    gsap.to(cursor, {
                        x: e.clientX,
                        y: e.clientY,
                        duration: 0.1,
                        ease: "power2.out"
                    });
                };
                window.addEventListener('mousemove', moveCursor);
                
                // Hide cursor on leaving window
                window.addEventListener('mouseout', () => gsap.to(cursor, {opacity: 0}));
                window.addEventListener('mouseover', () => gsap.to(cursor, {opacity: 1}));
                
                return () => window.removeEventListener('mousemove', moveCursor);
            }, []);

            // Handle Theme Toggle
            useEffect(() => {
                const html = document.documentElement;
                if (isDark) {
                    html.classList.add('dark');
                    html.classList.remove('light');
                } else {
                    html.classList.add('light');
                    html.classList.remove('dark');
                }
            }, [isDark]);

            const toggleTheme = () => setIsDark(!isDark);

            return (
                <ThemeContext.Provider value={{ isDark, toggleTheme }}>

                        <Hero />

                        <About />
